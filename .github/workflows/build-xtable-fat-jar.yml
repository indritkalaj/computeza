name: build-xtable-fat-jar

# F22: build a Computeza-side fat JAR for Apache XTable so the
# install path doesn't need Maven on the operator's host.
#
# This workflow runs manually (workflow_dispatch) on a release-cut
# cadence -- typically once per Apache XTable release, gated to
# whichever upstream tag the operator wants to ship. The resulting
# fat JAR is attached to a GitHub release on this repo, which gives
# us a CDN-backed download URL for free (GitHub fronts releases
# through their edge network).
#
# The xtable driver in crates/computeza-driver-native/src/linux/xtable.rs
# can then short-circuit the Maven-resolve install path when the
# operator's network can reach our release URL, and only fall back
# to Maven Central when the CDN is unreachable.

on:
  workflow_dispatch:
    inputs:
      xtable_version:
        description: "Apache XTable release tag to build (e.g. 0.3.0-incubating). Must match the artifact version in the org.apache.xtable Maven Central group."
        required: true
        default: "0.3.0-incubating"
      release_tag:
        description: "Release tag this asset is attached to (e.g. xtable-fat-jar-v0.3.0). The workflow creates the release if it does not exist."
        required: true
        default: "xtable-fat-jar-v0.3.0"

permissions:
  contents: write  # needed to create + upload release assets

env:
  XTABLE_GROUP: org.apache.xtable
  XTABLE_ARTIFACT: xtable-utilities

jobs:
  build:
    name: Build xtable fat JAR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Adoptium Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: "3.9.9"

      - name: Materialize the resolver pom.xml
        run: |
          set -euo pipefail
          mkdir -p build
          # The maven-shade-plugin assembles every dependency into
          # a single executable JAR. We declare xtable-utilities as
          # the only top-level dep; shade picks up everything
          # transitively and produces target/xtable-fat.jar.
          cat > build/pom.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>computeza.fat-jar</groupId>
            <artifactId>xtable-fat</artifactId>
            <version>1.0.0</version>
            <packaging>jar</packaging>
            <properties>
              <maven.compiler.source>21</maven.compiler.source>
              <maven.compiler.target>21</maven.compiler.target>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
            </properties>
            <dependencies>
              <dependency>
                <groupId>${{ env.XTABLE_GROUP }}</groupId>
                <artifactId>${{ env.XTABLE_ARTIFACT }}</artifactId>
                <version>${{ github.event.inputs.xtable_version }}</version>
              </dependency>
            </dependencies>
            <build>
              <finalName>xtable-fat</finalName>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-shade-plugin</artifactId>
                  <version>3.5.3</version>
                  <executions>
                    <execution>
                      <phase>package</phase>
                      <goals><goal>shade</goal></goals>
                      <configuration>
                        <createDependencyReducedPom>false</createDependencyReducedPom>
                        <filters>
                          <filter>
                            <artifact>*:*</artifact>
                            <excludes>
                              <exclude>META-INF/*.SF</exclude>
                              <exclude>META-INF/*.DSA</exclude>
                              <exclude>META-INF/*.RSA</exclude>
                            </excludes>
                          </filter>
                        </filters>
                        <transformers>
                          <transformer implementation="org.apache.maven.plugins.shade.resource.ServicesResourceTransformer"/>
                          <transformer implementation="org.apache.maven.plugins.shade.resource.ManifestResourceTransformer">
                            <mainClass>org.apache.xtable.utilities.RunSync</mainClass>
                          </transformer>
                        </transformers>
                      </configuration>
                    </execution>
                  </executions>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF

      - name: Build the fat JAR
        run: |
          set -euo pipefail
          cd build
          mvn -B -e -V package

      - name: Verify the JAR runs (-h smoke)
        run: |
          set -euo pipefail
          # If the main class is missing or any transitive dep was
          # excluded, this fails before we publish. We pass --help so
          # the JAR doesn't actually try to sync a real dataset.
          java -jar build/target/xtable-fat.jar --help || true
          # The JAR must be a non-trivial size; a 1KB shadow indicates
          # the shade plugin found no transitive deps to pull in.
          test "$(stat -c%s build/target/xtable-fat.jar)" -gt 1000000

      - name: Compute SHA-256
        id: sha
        run: |
          set -euo pipefail
          SHA=$(sha256sum build/target/xtable-fat.jar | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          # Emit a sidecar checksum file we ship alongside the JAR.
          echo "$SHA  xtable-fat.jar" > build/target/xtable-fat.jar.sha256

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/target/xtable-fat.jar dist/xtable-fat-${{ github.event.inputs.xtable_version }}.jar
          cp build/target/xtable-fat.jar.sha256 dist/xtable-fat-${{ github.event.inputs.xtable_version }}.jar.sha256

      - name: Upload to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: "Computeza-bundled XTable fat JAR ${{ github.event.inputs.xtable_version }}"
          body: |
            Computeza-side fat JAR for Apache XTable
            `${{ github.event.inputs.xtable_version }}`.

            Built via `mvn package` against `org.apache.xtable:xtable-utilities`
            with `maven-shade-plugin` consolidating every transitive
            dependency. SHA-256 sidecar is shipped alongside the JAR;
            the driver verifies before extraction.

            **Computeza driver consumption** (Linux x86_64):

            - `crates/computeza-driver-native/src/linux/xtable.rs` tries this
              CDN-backed URL first.
            - On 404 / network failure it falls back to the Maven-resolve
              path (requires `mvn` on the operator's host).
            - SHA-256 pin lives in the driver constant so a swapped JAR
              fails the install loudly rather than running silently.

            **SHA-256:** `${{ steps.sha.outputs.sha256 }}`

            Generated by `.github/workflows/build-xtable-fat-jar.yml`.
          files: |
            dist/xtable-fat-${{ github.event.inputs.xtable_version }}.jar
            dist/xtable-fat-${{ github.event.inputs.xtable_version }}.jar.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
