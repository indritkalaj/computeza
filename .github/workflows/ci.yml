name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Native cross-platform packaging is a v1.0 commitment (spec §10), so CI
# must validate Linux + macOS + Windows from day one. Matrix is small now
# to keep CI cheap; expand to ARM64 and the packaging matrix in §10.1
# once the packaging machinery lands.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      # --locked omitted intentionally until Cargo.lock is committed.
      # Re-add it (and commit the lockfile CI generates) after the first
      # green build so subsequent CI runs are reproducible.
      - run: cargo clippy --workspace --all-targets

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      # --locked omitted intentionally — see clippy job comment above.
      - run: cargo build --workspace
      - run: cargo test --workspace
