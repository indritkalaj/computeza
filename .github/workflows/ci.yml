name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs from the same ref when a newer one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Workflows ship with the minimum required permissions; nothing in CI
# writes to the repo, opens PRs, or pushes packages, so contents: read
# is enough.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# v0.0.x is Linux-only for the data-plane install path (see README.md
# "Platform support" and AGENTS.md). CI runs on ubuntu-latest only;
# macOS + Windows runners come back when the multi-OS install path
# lands in v0.1+ (spec section 10).

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  ascii:
    name: ascii-only
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Reject non-ASCII bytes in tracked source files
        # AGENTS.md rule (the audit on 2026-04-27): source files use only
        # US-ASCII printable + standard whitespace. Em-dashes, section
        # signs, smart quotes, arrows, etc. must be substituted at write
        # time. This guard is a regression net.
        run: |
          set -euo pipefail
          if git grep --cached -nIP '[\x80-\xff]' \
              -- '*.rs' '*.toml' '*.md' '*.ftl' '*.yml' '*.yaml' \
                 '*.json' '*.css' '*.html' '*.lock' \
                 '.gitignore' '.gitattributes' '.editorconfig' \
                 'rust-toolchain.toml' 'rustfmt.toml'; then
            echo
            echo "Non-ASCII characters found in tracked source. Run"
            echo "  python .audit-nonascii.py"
            echo "to see the offenders and substitute them with ASCII"
            echo "equivalents (-- for em-dash, 'section' for section sign,"
            echo "-> for arrows, etc.)."
            exit 1
          fi

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # Documented ignores. Re-evaluate every release; if upstream ships
      # a fix, drop the corresponding --ignore.
      #
      # RUSTSEC-2023-0071: `rsa` Marvin Attack. Pulled in transitively by
      #   `sqlx-mysql` because `sqlx-macros` always depends on all backend
      #   crates regardless of which features are enabled. We don't
      #   connect to MySQL at runtime; the sidechannel is unreachable for
      #   us. Upstream has no published fix as of 2026-05-11.
      #
      # RUSTSEC-2024-0436: `paste` unmaintained. Pulled in by every
      #   Leptos sub-crate (tachys, reactive_graph, leptos_dom, ...);
      #   we can't replace it without forking Leptos.
      - run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked

  e2e:
    # H32 end-to-end smoke. Builds the binary in release mode, boots
    # `computeza serve` against a temporary state directory, exercises
    # the operator console's first-boot flow over HTTP, verifies the
    # audit log gets written, and tears down cleanly. Does NOT install
    # any data-plane components (those need root + systemd; v0.1+
    # extends the matrix to that path).
    name: e2e (first-boot console)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin computeza

      - name: Prepare workdir
        id: prep
        run: |
          set -euo pipefail
          WORK="$RUNNER_TEMP/computeza-e2e"
          mkdir -p "$WORK"
          echo "workdir=$WORK" >> "$GITHUB_OUTPUT"

      - name: Boot the operator console in the background
        env:
          COMPUTEZA_SECRETS_PASSPHRASE: e2e-passphrase-for-ci-only
          RUST_LOG: info
        run: |
          set -euo pipefail
          cd "${{ steps.prep.outputs.workdir }}"
          # Bind to a per-job free port so concurrent CI runs on the
          # same self-hosted runner do not collide. We use a fixed
          # 8401 here (off the default 8400) because GitHub-hosted
          # runners are job-isolated.
          nohup "$GITHUB_WORKSPACE/target/release/computeza" \
              serve --addr 127.0.0.1:8401 --state-db "$PWD/state.db" \
              > computeza.log 2>&1 &
          echo $! > computeza.pid
          # Wait up to 30s for /healthz to come up.
          for i in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:8401/healthz >/dev/null; then
              echo "console healthy on attempt $i"
              exit 0
            fi
            sleep 0.5
          done
          echo "console did not come up in 30s; log tail:" >&2
          tail -n 80 computeza.log >&2 || true
          exit 1

      - name: First-boot setup -- create the initial admin account
        run: |
          set -euo pipefail
          cd "${{ steps.prep.outputs.workdir }}"
          # GET /setup should serve the first-boot form (200).
          STATUS=$(curl --silent -o /dev/null -w "%{http_code}" http://127.0.0.1:8401/setup)
          test "$STATUS" = "200" || { echo "expected /setup 200, got $STATUS" >&2; exit 1; }
          # POST /setup -- creates the admin operator + mints a session.
          # /setup is CSRF-exempt (no session exists yet) so the
          # csrf_token field can stay empty.
          curl --silent --fail \
              -c cookies.txt \
              -d "username=e2eadmin" \
              -d "password=hunter2hunter2" \
              -d "password_confirm=hunter2hunter2" \
              http://127.0.0.1:8401/setup \
              -o /dev/null \
              -w "%{http_code}\n" \
              | grep -E '^(2|3)' >/dev/null
          # Cookie file should now carry the session.
          grep computeza_session cookies.txt
          grep computeza_csrf cookies.txt

      - name: Authenticated /install renders the unified hub
        run: |
          set -euo pipefail
          cd "${{ steps.prep.outputs.workdir }}"
          BODY=$(curl --silent --fail -b cookies.txt http://127.0.0.1:8401/install)
          echo "$BODY" | grep -q "Install Computeza"
          echo "$BODY" | grep -q 'name="postgres__port"'
          echo "$BODY" | grep -q 'name="csrf_token"'

      - name: Audit log shows the first-boot setup event
        run: |
          set -euo pipefail
          cd "${{ steps.prep.outputs.workdir }}"
          test -f audit.jsonl
          test -f audit.key
          # The login that ran inside /setup creates an Authn event.
          # We verify the file isn't empty and parses as JSONL.
          test -s audit.jsonl
          while IFS= read -r line; do
            echo "$line" | python3 -c "import json,sys; json.loads(sys.stdin.read())"
          done < audit.jsonl

      - name: Tear down
        if: always()
        run: |
          set -eu
          cd "${{ steps.prep.outputs.workdir }}" || exit 0
          if [ -f computeza.pid ]; then
            kill "$(cat computeza.pid)" 2>/dev/null || true
          fi
          # Surface the server log on failure for diagnostics.
          if [ "${{ job.status }}" = "failure" ] && [ -f computeza.log ]; then
            echo "--- computeza.log (last 200 lines) ---"
            tail -n 200 computeza.log
          fi
