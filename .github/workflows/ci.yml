name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs from the same ref when a newer one starts.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Workflows ship with the minimum required permissions; nothing in CI
# writes to the repo, opens PRs, or pushes packages, so contents: read
# is enough.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# v0.0.x is Linux-only for the data-plane install path (see README.md
# "Platform support" and AGENTS.md). CI runs on ubuntu-latest only;
# macOS + Windows runners come back when the multi-OS install path
# lands in v0.1+ (spec section 10).

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check

  ascii:
    name: ascii-only
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Reject non-ASCII bytes in tracked source files
        # AGENTS.md rule (the audit on 2026-04-27): source files use only
        # US-ASCII printable + standard whitespace. Em-dashes, section
        # signs, smart quotes, arrows, etc. must be substituted at write
        # time. This guard is a regression net.
        run: |
          set -euo pipefail
          if git grep --cached -nIP '[\x80-\xff]' \
              -- '*.rs' '*.toml' '*.md' '*.ftl' '*.yml' '*.yaml' \
                 '*.json' '*.css' '*.html' '*.lock' \
                 '.gitignore' '.gitattributes' '.editorconfig' \
                 'rust-toolchain.toml' 'rustfmt.toml'; then
            echo
            echo "Non-ASCII characters found in tracked source. Run"
            echo "  python .audit-nonascii.py"
            echo "to see the offenders and substitute them with ASCII"
            echo "equivalents (-- for em-dash, 'section' for section sign,"
            echo "-> for arrows, etc.)."
            exit 1
          fi

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: clippy (with output captured to job summary)
        # Temporary: pipe stderr to the public job summary so the
        # actual lint error is visible without log-download admin rights.
        # Revert this step back to a plain `cargo clippy ... --locked`
        # once the linux-specific failure is fixed.
        run: |
          set -o pipefail
          {
            echo '## clippy output'
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cargo clippy --workspace --all-targets --locked 2>&1 \
            | tee -a "$GITHUB_STEP_SUMMARY"
          status=$?
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      # Documented ignores. Re-evaluate every release; if upstream ships
      # a fix, drop the corresponding --ignore.
      #
      # RUSTSEC-2023-0071: `rsa` Marvin Attack. Pulled in transitively by
      #   `sqlx-mysql` because `sqlx-macros` always depends on all backend
      #   crates regardless of which features are enabled. We don't
      #   connect to MySQL at runtime; the sidechannel is unreachable for
      #   us. Upstream has no published fix as of 2026-05-11.
      #
      # RUSTSEC-2024-0436: `paste` unmaintained. Pulled in by every
      #   Leptos sub-crate (tachys, reactive_graph, leptos_dom, ...);
      #   we can't replace it without forking Leptos.
      - run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0436

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: build + test (with output captured to job summary)
        # Temporary: same diagnostic capture as the clippy job. Revert
        # once the linux-specific build failure is fixed.
        run: |
          set -o pipefail
          {
            echo '## test output'
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cargo build --workspace --locked 2>&1 \
            | tee -a "$GITHUB_STEP_SUMMARY"
          build_status=$?
          if [ "$build_status" -ne 0 ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$build_status"
          fi
          cargo test --workspace --locked 2>&1 \
            | tee -a "$GITHUB_STEP_SUMMARY"
          test_status=$?
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$test_status"
